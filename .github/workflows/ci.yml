name: CI

on:
  pull_request:
    branches:
      - main
      - 'claude/**'
  push:
    branches:
      - main

jobs:
  phpunit:
    name: PHPUnit (security suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, intl, pdo_mysql, json, openssl, curl, zip, gd
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run security test suite
        run: vendor/bin/phpunit --testsuite security

  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Syntax check (php -l) on src/ and tests/
        run: |
          set -e
          find src tests -type f -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l \
            | (! grep -v '^No syntax errors detected')
