name: CI

on:
  pull_request:
    branches:
      - main
      - 'claude/**'
  push:
    branches:
      - main

jobs:
  phpunit:
    name: PHPUnit (security suite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, json, openssl, curl, zip, gd
          coverage: none
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run security test suite
        run: |
          set -o pipefail
          vendor/bin/phpunit --testsuite security --testdox 2>&1 | tee phpunit-output.txt

      - name: Surface PHPUnit output on failure
        if: failure()
        run: |
          echo "## PHPUnit failure log" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -200 phpunit-output.txt >> "$GITHUB_STEP_SUMMARY" || echo "(no phpunit-output.txt)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "## composer.lock packages (PHP req)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          php -v >> "$GITHUB_STEP_SUMMARY"
          composer show --installed 2>&1 | head -40 >> "$GITHUB_STEP_SUMMARY" || true
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Upload PHPUnit output as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: phpunit-output
          path: phpunit-output.txt
          if-no-files-found: ignore

  lint:
    name: PHP lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Syntax check (php -l) on src/ and tests/
        run: |
          set -e
          find src tests -type f -name '*.php' -print0 \
            | xargs -0 -n1 -P4 php -l \
            | (! grep -v '^No syntax errors detected')
